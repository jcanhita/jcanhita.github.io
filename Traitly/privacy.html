<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Traitly Privacy Policy</title>
  <meta name="color-scheme" content="light dark"/>
  <style>
    :root {
      --bg: #f9fafb;
      --fg: #1f2937;
      --muted: #6b7280;
      --card: #ffffff;
      --accent: #7c3aed;
      --border: #e5e7eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f14;
        --fg: #e5e7eb;
        --muted: #9ca3af;
        --card: #121821;
        --accent: #a78bfa;
        --border: #1f2937;
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background:
        radial-gradient(1200px 800px at 75% -10%, #ede9fe55, transparent 60%),
        radial-gradient(1000px 600px at 0% 110%, #dbeafe44, transparent 60%),
        var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }

    .wrap {
      max-width: 900px;
      margin: clamp(16px, 4vw, 64px) auto;
      padding: clamp(12px, 2vw, 24px);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: clamp(20px, 3vw, 40px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.03);
    }

    header {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      letter-spacing: .2px;
    }

    h2 {
      margin: 1.2rem 0 .6rem;
      font-size: clamp(1.15rem, 2.2vw, 1.45rem);
    }

    p,
    li {
      font-size: clamp(.98rem, 1.6vw, 1.05rem);
    }

    ul {
      margin: .4rem 0 .8rem 1.2rem;
    }

    .muted {
      color: var(--muted);
    }

    .meta {
      font-size: 0.95rem;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0 20px;
    }

    .footer {
      margin-top: 1.2rem;
      font-size: .95rem;
      color: var(--muted);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    select {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    [dir="rtl"] .card {
      direction: rtl;
    }

    [dir="rtl"] ul {
      margin-left: 0;
      margin-right: 1.2rem;
    }
  </style>
</head>

/* ===== Locale plumbing ===== */
const RTL = new Set(["ar", "ar-SA", "he"]);
const langSelect = document.getElementById("lang");

function normalize(code) {
  return (code || "en").replace("_", "-");
}

function baseOf(code) {
  return normalize(code).split("-")[0];
}

function pickStrings(locale) {
  const loc = normalize(locale);
  if (T[loc] && Object.keys(T[loc]).length) {
    return T[loc];
  }

  const base = baseOf(loc);
  if (T[base] && Object.keys(T[base]).length) {
    return T[base];
  }

  return T["en"];
}

function bestLocale() {
  const nav = (navigator.languages && navigator.languages[0]) || navigator.language || "en";
  const norm = normalize(nav);

  if (T[norm]) {
    return norm;
  }

  const base = baseOf(norm);
  return T[base] ? base : "en";
}

function populateLanguageOptions(current) {
  langSelect.innerHTML = "";

  Object.keys(T).sort().forEach(k => {
    const opt = document.createElement("option");
    opt.value = k;
    opt.textContent = k;

    if (k === current) {
      opt.selected = true;
    }

    langSelect.appendChild(opt);
  });
}

function formatDate(iso, locale) {
  try {
    return new Date(iso).toLocaleDateString(locale, {
      year: "numeric",
      month: "long",
      day: "numeric"
    });
  } catch {
    return iso;
  }
}

function fillList(elementId, items) {
  const ul = document.getElementById(elementId);
  ul.innerHTML = "";

  (items || []).forEach(x => {
    const li = document.createElement("li");
    li.textContent = x;
    ul.appendChild(li);
  });
}

function render(locale) {
  const t = pickStrings(locale);

  document.documentElement.lang = locale;
  document.documentElement.dir = RTL.has(locale) ? "rtl" : "ltr";

  document.getElementById("title").textContent = t.title;
  document.getElementById("langLabel").textContent = t.langLabel || "Language:";
  document.getElementById("effectiveDate").textContent = `${t.effectiveDatePrefix}: ${formatDate(CONFIG.effectiveDateISO, locale)}`;

  document.getElementById("sectionSummary").textContent = t.sectionSummary;
  document.getElementById("sectionPersonalData").textContent = t.sectionPersonalData;
  document.getElementById("sectionUsageStats").textContent = t.sectionUsageStats;
  document.getElementById("sectionPurchases").textContent = t.sectionPurchases;
  document.getElementById("sectionNotifications").textContent = t.sectionNotifications;
  document.getElementById("sectionDisclaimer").textContent = t.sectionDisclaimer;
  document.getElementById("sectionChanges").textContent = t.sectionChanges;
  document.getElementById("sectionContact").textContent = t.sectionContact;

  document.getElementById("pSummary1").textContent = t.summary1;
  document.getElementById("pSummary2").textContent = t.summary2;

  document.getElementById("pPersonalData1").textContent = t.personalData1;
  fillList("listPersonalData", t.personalDataList);
  document.getElementById("pPersonalData2").textContent = t.personalData2;

  document.getElementById("pUsageStats1").textContent = t.usageStats1;
  fillList("listUsageStats", t.usageStatsList);
  document.getElementById("pUsageStats2").textContent = t.usageStats2;

  document.getElementById("pPurchases").textContent = t.purchases;
  document.getElementById("pNotifications").textContent = t.notifications;
  document.getElementById("pDisclaimer").textContent = t.disclaimer;

  document.getElementById("pChanges1").textContent = t.changes1;
  document.getElementById("pChanges2").textContent = t.changes2;

  document.getElementById("pContact").textContent = t.contact;

  const ulc = document.getElementById("listContact");
  ulc.innerHTML = "";

  const li = document.createElement("li");
  li.innerHTML = `${t.emailLabel || "Email"}: <a href="mailto:${CONFIG.contactEmail}">${CONFIG.contactEmail}</a>`;
  ulc.appendChild(li);

  document.getElementById("footerNote").textContent = t.footer;
}

/* Init */
(function init() {
  const locale = bestLocale();
  populateLanguageOptions(locale);
  render(locale);
  langSelect.addEventListener("change", e => render(e.target.value));
})();
</script>
