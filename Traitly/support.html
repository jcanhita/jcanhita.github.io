<!DOCTYPE html>

<head>
  <meta charset="UTF-8"/>

  <meta name="color-scheme" content="light dark"/>
  <style>
    :root {
      --bg: #f9fafb;
      --fg: #1f2937;
      --muted: #6b7280;
      --card: #ffffff;
      --accent: #7c3aed;
      --border: #e5e7eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f14;
        --fg: #e5e7eb;
        --muted: #9ca3af;
        --card: #121821;
        --accent: #a78bfa;
        --border: #1f2937;
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background:
        radial-gradient(1200px 800px at 75% -10%, #ede9fe55, transparent 60%),
        radial-gradient(1000px 600px at 0% 110%, #dbeafe44, transparent 60%),
        var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }

    .wrap {
      max-width: 900px;
      margin: clamp(16px, 4vw, 64px) auto;
      padding: clamp(12px, 2vw, 24px);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: clamp(20px, 3vw, 40px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.03);
    }

    header {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      letter-spacing: .2px;
    }

    h2 {
      margin: 1.2rem 0 .6rem;
      font-size: clamp(1.2rem, 2.2vw, 1.5rem);
    }

    p,
    li {
      font-size: clamp(.98rem, 1.6vw, 1.05rem);
    }

    ul {
      margin: .4rem 0 .8rem 1.2rem;
    }

    .muted {
      color: var(--muted);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    select {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 1.2rem;
      font-size: .95rem;
      color: var(--muted);
    }

    [dir="rtl"] .card {
      direction: rtl;
    }

    [dir="rtl"] ul {
      margin-left: 0;
      margin-right: 1.2rem;
    }
  </style>
</head>

/* ===== Locale plumbing ===== */
function normalize(code) {
  return (code || "en").replace("_", "-");
}

function baseOf(code) {
  return normalize(code).split("-")[0];
}

function bestLocale() {
  const nav = (navigator.languages && navigator.languages[0]) || navigator.language || "en";
  const norm = normalize(nav);

  if (T[norm]) {
    return norm;
  }

  const base = baseOf(norm);

  if (T[base]) {
    return base;
  }

  return "en";
}

const langSelect = document.getElementById("lang");

function populateLanguageOptions(current) {
  const keys = Object.keys(T).sort();
  langSelect.innerHTML = "";

  keys.forEach(k => {
    const opt = document.createElement("option");
    opt.value = k;
    opt.textContent = k;

    if (k === current) {
      opt.selected = true;
    }

    langSelect.appendChild(opt);
  });
}

function pickStrings(locale) {
  if (T[locale] && Object.keys(T[locale]).length) {
    return T[locale];
  }

  const base = baseOf(locale);
  return T[base] || T["en"];
}

function fillList(elementId, items) {
  const ul = document.getElementById(elementId);
  ul.innerHTML = "";

  (items || []).forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    ul.appendChild(li);
  });
}

function render(locale) {
  const t = pickStrings(locale);

  document.documentElement.lang = locale;
  document.documentElement.dir = RTL.has(locale) ? "rtl" : "ltr";

  document.getElementById("appName").textContent = CONFIG.appName;
  document.getElementById("langLabel").textContent = t.langLabel || "Language:";

  document.getElementById("supportHeading").textContent = t.heading;
  document.getElementById("supportText1").textContent = t.p1;
  document.getElementById("supportText2").textContent = t.p2;

  document.getElementById("helpHeading").textContent = t.helpHeading;
  fillList("helpList", t.helpList);

  document.getElementById("beforeContactHeading").textContent = t.beforeContactHeading;
  fillList("beforeContactList", t.beforeContactList);

  document.getElementById("contactHeading").textContent = t.contactHeading;
  document.getElementById("contactText").textContent = t.contactText;

  const ul = document.getElementById("contactList");
  ul.innerHTML = "";

  const li = document.createElement("li");
  li.innerHTML = `<strong>${t.emailLabel || "Email"}:</strong> <a href="mailto:${CONFIG.contactEmail}">${CONFIG.contactEmail}</a>`;
  ul.appendChild(li);

  document.getElementById("footer").textContent = t.footer;
}

/* Init */
(function init() {
  const locale = bestLocale();
  populateLanguageOptions(locale);
  render(locale);
  langSelect.addEventListener("change", e => render(e.target.value));
})();
</script>
